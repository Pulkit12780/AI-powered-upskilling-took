services:
  - type: web
    name: upskillforjob
    runtime: python
    buildCommand: pip install --no-cache-dir --upgrade -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
